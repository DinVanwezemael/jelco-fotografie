<!DOCTYPE html>
<html lang="{{ site.lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {% seo title=true %}
  <link rel="icon" type="image/jpeg" href="{{ '/assets/images/logo.jpg' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <a class="logo" href="{{ '/' | relative_url }}">
        <img class="logo-mark" src="{{ '/assets/images/logo.jpg' | relative_url }}" alt="">
        <span class="logo-text">Jelco Fotografie</span>
      </a>
      <button class="nav-toggle" aria-label="Menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>Home</a>
        <a href="{{ '/projecten/automotive/' | relative_url }}" {% if page.category == 'Automotive' %}class="active"{% endif %}>Automotive</a>
        <a href="{{ '/projecten/motorsport/' | relative_url }}" {% if page.category == 'Motorsport' %}class="active"{% endif %}>Motorsport</a>
        <a href="{{ '/projecten/architectuur/' | relative_url }}" {% if page.category == 'Architectuur' %}class="active"{% endif %}>Architectuur</a>
        <a href="{{ '/projecten/interieur/' | relative_url }}" {% if page.category == 'Interieur' %}class="active"{% endif %}>Interieur</a>
        <a href="{{ '/projecten/prints/' | relative_url }}" {% if page.category == 'Prints' %}class="active"{% endif %}>Prints</a>
        <a href="{{ '/over-mij/' | relative_url }}">Over mij</a>
        <a href="{{ '/contact/' | relative_url }}">Contact</a>
      </nav>
    </div>
  </header>

  <main>
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="wrap footer-inner">
      <p>&copy; {{ 'now' | date: "%Y" }} Jelco Fotografie. Alle rechten voorbehouden.</p>
      <div class="footer-social">
        <a href="https://instagram.com/jelcofotografie" target="_blank" rel="noopener" aria-label="Instagram">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3.5" y="3.5" width="17" height="17" rx="4"/><circle cx="12" cy="12" r="4"/><circle cx="17" cy="7" r="1" fill="currentColor" stroke="none"/></svg>
        </a>
        <a href="https://facebook.com/jelcofotografie" target="_blank" rel="noopener" aria-label="Facebook">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>
        </a>
        <a href="https://linkedin.com/company/jelcofotografie" target="_blank" rel="noopener" aria-label="LinkedIn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>
        </a>
        <a href="mailto:info@jelcofotografie.be" aria-label="E-mail">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        </a>
      </div>
    </div>
  </footer>

  <script>
    document.querySelector('.nav-toggle').addEventListener('click', function () {
      var nav = document.querySelector('.site-nav');
      var expanded = this.getAttribute('aria-expanded') === 'true';
      this.setAttribute('aria-expanded', String(!expanded));
      nav.classList.toggle('open');
    });
  </script>
</body>
</html>
