# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms/schema/sveltia-cms.json

backend:
  name: github
  repo: DinVanwezemael/jelco-fotografie
  branch: main
  base_url: https://REPLACE-ME.workers.dev

site_url: https://jelcofotografie.be

media_folder: "assets/cms-uploads"
public_folder: "/assets/cms-uploads"

slug:
  encoding: "ascii"
  clean_accents: true
  sanitize_replacement: "-"

collections:
  - name: projects
    label: "Projecten"
    label_singular: "Project"
    folder: _projects
    create: true
    delete: true
    extension: md
    format: yaml-frontmatter
    slug: "{{slug}}"
    media_folder: "../assets/cms-projects/{{slug}}"
    public_folder: "/assets/cms-projects/{{slug}}"
    identifier_field: title
    fields:
      - { label: "Layout", name: layout, widget: hidden, default: project }
      - { label: "Titel", name: title, widget: string }
      - label: "Categorie"
        name: categorie
        widget: select
        options: ["Automotive", "Motorsport", "Architectuur", "Interieur", "Prints"]
      - { label: "Locatie", name: locatie, widget: string, required: false }
      - { label: "Datum", name: datum, widget: datetime, format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false, picker_utc: true, required: false }
      - { label: "Samenvatting", name: samenvatting, widget: text, required: false }
      - { label: "Uitgelicht op homepage", name: uitgelicht, widget: boolean, default: false }
      - label: "Foto's"
        name: images
        widget: image
        multiple: true
        required: true
        min: 1
      - { label: "Beschrijving", name: body, widget: markdown, required: false }
